<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VerifyFacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <span class="logo-v">V</span>
      </div>
      <span class="logo-text">VerifyFacts</span>
    </div>
    <div class="header-actions">
      <button class="theme-btn" id="themeToggle" title="Toggle theme">
        <svg id="themeIconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="themeIconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="settings-btn" id="settingsToggle" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Settings panel (theme only) ─────────────────────────────────────── -->
  <section class="settings-panel hidden" id="settingsPanel">
    <div class="theme-toggle-row">
      <span class="theme-toggle-label">Theme</span>
      <div class="theme-pill">
        <button class="theme-pill-btn active" id="darkBtn">🌙 Dark</button>
        <button class="theme-pill-btn" id="lightBtn">☀️ Light</button>
      </div>
    </div>
  </section>

  <!-- ── Idle state ────────────────────────────────────────────────────────── -->
  <section class="idle-state" id="idleState">
    <p class="idle-hint">What should I verify?</p>
    <div class="mode-grid">
      <button class="mode-btn" data-mode="page">
        <span class="mode-icon">📰</span>
        <span>This page</span>
      </button>
      <button class="mode-btn" data-mode="selection">
        <span class="mode-icon">✂️</span>
        <span>Selection</span>
      </button>
      <button class="mode-btn" data-mode="image">
        <span class="mode-icon">🖼️</span>
        <span>Main image</span>
      </button>
      <button class="mode-btn" data-mode="url">
        <span class="mode-icon">🔗</span>
        <span>Enter URL</span>
      </button>
    </div>
    <div class="url-row hidden" id="urlRow">
      <input type="url" id="urlInput" placeholder="https://example.com/article">
      <button class="btn-primary small" id="verifyUrl">Go</button>
    </div>
  </section>

  <!-- ── Loading state ────────────────────────────────────────────────────── -->
  <section class="loading-state hidden" id="loadingState">
    <div class="loader-ring"></div>
    <p class="loading-label" id="loadingLabel">Analyzing content…</p>
    <div class="loading-steps" id="loadingSteps">
      <div class="step active" id="step1">Extracting claims</div>
      <div class="step" id="step2">Searching sources</div>
      <div class="step" id="step3">Generating verdict</div>
    </div>
  </section>

  <!-- ── Result state ─────────────────────────────────────────────────────── -->
  <section class="result-state hidden" id="resultState">
    <div class="verdict-card" id="verdictCard">
      <div class="verdict-top">
        <div class="verdict-badge" id="verdictBadge">—</div>
        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 56 56">
            <circle class="ring-bg" cx="28" cy="28" r="22"/>
            <circle class="ring-fill" id="ringFill" cx="28" cy="28" r="22"
              stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
          </svg>
          <span class="score-num" id="scoreNum">—</span>
        </div>
      </div>
      <p class="summary" id="summary"></p>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="claims">Claims</button>
      <button class="tab" data-tab="sources">Sources</button>
      <button class="tab" data-tab="flags">Flags</button>
    </div>

    <div class="tab-panel" id="tab-claims">
      <ul class="claims-list" id="claimsList"></ul>
      <button class="btn-highlight hidden" id="highlightBtn">Highlight on page</button>
    </div>
    <div class="tab-panel hidden" id="tab-sources">
      <ul class="sources-list" id="sourcesList"></ul>
    </div>
    <div class="tab-panel hidden" id="tab-flags">
      <ul class="flags-list" id="flagsList"></ul>
    </div>

    <button class="btn-reset" id="resetBtn">← Verify something else</button>
  </section>

  <!-- ── Error state ──────────────────────────────────────────────────────── -->
  <section class="error-state hidden" id="errorState">
    <div class="error-icon">⚠️</div>
    <p class="error-msg" id="errorMsg"></p>
    <button class="btn-primary" id="retryBtn">Try again</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
